<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products | Sky Industries - Premium Electrical Catalog</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="description" content="Explore the Sky Industries catalog featuring high-grade industrial PVC casing patti, conduit pipes, and installation accessories.">

    <style>
        /* --- HIGH-END DESIGN SYSTEM & VARIABLES --- */
        :root {
            --primary-blue: #0056B3;
            --gradient-blue: linear-gradient(135deg, #0056B3 0%, #002855 100%);
            --metallic-glow: linear-gradient(90deg, #FFFFFF, #B0D4FF, #FFFFFF);
            --dark-grey: #0F1113;
            --light-bg: #F4F7FB;
            --white: #FFFFFF;
            --text-dark: #101214;
            --text-muted: #5F6468;
            --accent-blue: #007BFF;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --max-width: 1440px; 
        }

        /* --- GLOBAL RESETS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-main);
            color: var(--text-dark);
            line-height: 1.65;
            background-color: var(--white);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        .container {
            width: 92%;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        /* --- SPARKLING CURSOR ENGINES CSS --- */
        /* 1. Standard Blue Hover Trail Sparkle */
        .sparkle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #77B5FE 0%, rgba(0, 86, 179, 0.8) 60%, transparent 100%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 10px #007BFF, 0 0 20px #0056B3;
            transform: translate(-50%, -50%);
            animation: sparkleFade 0.8s ease-out forwards;
        }

        @keyframes sparkleFade {
            0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0) rotate(180deg); opacity: 0; }
        }

        /* 2. High-Voltage Electric Click Arc Burst */
        .click-spark {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            animation: clickSparkFade 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes clickSparkFade {
            0% { transform: translate(-50%, -50%) translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        /* --- STICKY NAVIGATION HEADER --- */
        header {
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.02);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            position: relative;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1010;
        }

        .logo-block img {
            height: 70px;
            width: auto;
            transition: var(--transition-smooth);
        }

        .logo-block:hover img {
            transform: rotate(-5deg) scale(1.05);
        }

        .brand-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: #002855;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
        }

        .brand-title span {
            color: var(--primary-blue);
        }

        .nav-menu-wrapper {
            display: flex;
            align-items: center;
        }

        #menu-toggle {
            display: none;
        }

        .hamburger-label {
            display: none;
            cursor: pointer;
            padding: 10px;
            z-index: 1010;
        }

        .hamburger-label .bar {
            display: block;
            width: 28px;
            height: 3px;
            margin: 5px auto;
            background-color: #002855;
            transition: all 0.4s ease-in-out;
            border-radius: 2px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            font-weight: 700;
            color: #2A2C2E;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            position: relative;
            padding: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background-color: var(--primary-blue);
            transition: var(--transition-smooth);
            border-radius: 4px;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        /* --- INNER PAGE BANNER --- */
        .page-banner {
            background: linear-gradient(135deg, #050E22 0%, #0D1F42 100%);
            color: var(--white);
            padding: 100px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-banner::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: radial-gradient(rgba(0, 86, 179, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }

        .page-banner h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
            background: var(--metallic-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-banner p {
            font-size: 1.2rem;
            color: #C0D6F2;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            font-weight: 300;
        }

        /* --- MAIN PRODUCT SPECIFICATIONS SECTION --- */
        .catalog-section {
            padding: 100px 0;
            background-color: var(--white);
        }

        .product-focus-card {
            display: flex;
            background: #F9FAFC;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
            margin-bottom: 80px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            flex-wrap: wrap;
        }

        .product-focus-img {
            flex: 1 1 450px;
            background: linear-gradient(135deg, #FAFCFF 0%, #E9EFF8 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
            min-height: 400px;
        }

        .product-focus-img img {
            max-height: 300px;
            width: auto;
            transition: var(--transition-smooth);
        }

        .product-focus-card:hover .product-focus-img img {
            transform: scale(1.06);
        }

        .product-focus-details {
            flex: 1 1 550px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .catalog-tag {
            align-self: flex-start;
            background-color: rgba(0, 86, 179, 0.1);
            color: var(--primary-blue);
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .product-focus-details h2 {
            font-size: 2.4rem;
            color: var(--dark-grey);
            margin-bottom: 15px;
            font-weight: 800;
        }

        .product-focus-details p {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        /* --- DATASHEETS & PRICING MATRICES --- */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border: 1px solid #EAEEF3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 1rem;
        }

        th {
            background-color: #0D1F42;
            color: var(--white);
            padding: 18px 24px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid #EAEEF3;
            color: #333639;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:nth-child(even) {
            background-color: #F8FAFC;
        }

        tr:hover td {
            background-color: rgba(0, 86, 179, 0.03);
            color: var(--primary-blue);
        }

        /* --- ANIMATED RATE CALCULATOR MATRIX --- */
        .calculator-section {
            padding: 100px 0;
            background-color: var(--light-bg);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .calc-container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-block label {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--dark-grey);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-block select, .input-block input {
            padding: 14px 20px;
            border-radius: 8px;
            border: 2px solid #E2E8F0;
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark-grey);
            outline: none;
            transition: var(--transition-smooth);
        }

        .input-block select:focus, .input-block input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
        }

        .calc-output-window {
            margin-top: 40px;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            border-radius: 16px;
            padding: 30px;
            color: var(--white);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .calc-output-window h4 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94A3B8;
            margin-bottom: 10px;
        }

        .price-display {
            font-size: 3rem;
            font-weight: 900;
            color: #00FFCC;
            text-shadow: 0 0 20px rgba(0,255,204,0.3);
            transition: var(--transition-smooth);
        }

        .calc-note {
            font-size: 0.85rem;
            color: #94A3B8;
            margin-top: 15px;
        }

        /* --- THE CORE TYPOGRAPHY ALIGNMENT --- */
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            color: var(--dark-grey);
            margin-bottom: 20px;
            position: relative;
            padding-bottom: 20px;
            font-weight: 800;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: var(--gradient-blue);
            border-radius: 4px;
        }

        .section-subtitle {
